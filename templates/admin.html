<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Карточка администратора */
        .admin-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            transition: transform 0.2s ease;
        }

        .admin-card:hover {
            transform: translateY(-5px);
        }

        /* Заголовок */
        .admin-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .admin-header p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 18px;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Контейнер для двух кнопок */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        /* Общий стиль кнопок */
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn i {
            font-size: 18px;
        }

        .action-btn:hover {
            transform: scale(1.02);
        }

        /* Кнопка создания */
        .btn-create {
            background: linear-gradient(105deg, #10b981 0%, #059669 100%);
        }
        .btn-create:hover {
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        /* Кнопка удаления */
        .btn-delete {
            background: linear-gradient(105deg, #ef4444 0%, #dc2626 100%);
        }
        .btn-delete:hover {
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }

        /* Ссылка назад (опционально) */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link i {
            margin-right: 6px;
        }

        .back-link:hover {
            color: #667eea;
            text-decoration: underline;
        }

        /* Flash-сообщения */
        .flash-message {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .flash-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .flash-error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .flash-warning {
            background-color: #fed7aa;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="admin-header">
            <!-- Блок flash-сообщений -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <h1>Верши судьбы</h1>
            <p>Создание и удаление учётных записей</p>
        </div>

        <form method="POST" action="#">
            <div class="input-group">
                <label class="input-label" for="login">Логин</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login" name="login" placeholder="Введите логин" required autofocus>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">Пароль <span style="font-weight: normal; color: #6c757d;">(видимый)</span></label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <!-- Пароль видимый: type="text" -->
                    <input type="text" id="password" name="password" placeholder="Введите пароль" required>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="is_admin">
                    <i class="fas fa-shield-alt"></i> Администратор
                </label>
                <div class="input-wrapper" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="is_admin" name="is_admin" value="yes" style="width: 20px; height: 20px; margin-left: 16px;">
                    <span style="font-size: 14px; color: #334155;">Дать права администратора</span>
                </div>
            </div>
            <div class="button-group">
                <button type="submit" name="create" class="action-btn btn-create">
                    <i class="fas fa-plus-circle"></i> Создать
                </button>
                <button type="submit" name="delete" class="action-btn btn-delete">
                    <i class="fas fa-trash-alt"></i> Удалить
                </button>
            </div>
        </form>

        <a href="/main" class="back-link">
            <i class="fas fa-arrow-left"></i> Вернуться на главную страницу
        </a>
    </div>
</body>
</html>
