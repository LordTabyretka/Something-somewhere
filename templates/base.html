<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Моё приложение{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Глобальные стили — тёмная тема */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #0a0a0f);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }

        /* Стили тостов — тёмная тема */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 320px;
        }
        .toast {
            background: rgba(30, 30, 47, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 4s forwards;
            border-left: 4px solid;
        }
        .toast-success { border-left-color: #10b981; }
        .toast-error { border-left-color: #ef4444; }
        .toast-info { border-left-color: #8b5cf6; }
        .toast-icon i { font-size: 20px; }
        .toast-success .toast-icon i { color: #10b981; }
        .toast-error .toast-icon i { color: #ef4444; }
        .toast-info .toast-icon i { color: #8b5cf6; }
        .toast-message {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
            word-break: break-word;
        }
        .toast-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }
        .toast-close:hover { color: #ef4444; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Контейнер для тостов (всегда внизу справа) -->
    <div class="toast-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="toast toast-{{ category }}">
                        <div class="toast-icon">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
                        </div>
                        <div class="toast-message">{{ message }}</div>
                        <button class="toast-close" onclick="this.parentElement.remove();">&times;</button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <!-- Основной контент -->
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // При наведении на тост отменяем автоматическое исчезновение
        document.querySelectorAll('.toast').forEach(toast => {
            toast.addEventListener('mouseenter', () => {
                toast.style.animation = 'slideIn 0.3s ease';
                toast.style.opacity = '1';
                toast.style.visibility = 'visible';
            });
            toast.addEventListener('mouseleave', () => {
                toast.style.animation = 'fadeOut 0.5s ease 2s forwards';
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
