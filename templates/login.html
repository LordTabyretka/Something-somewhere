{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block extra_css %}
<style>
    /* Стили для карточки входа */
    .login-card {
        background: white;
        border-radius: 32px;
        box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
        max-width: 440px;
        margin: 0 auto;
        padding: 40px 32px;
        transition: transform 0.2s ease;
    }
    .login-card:hover {
        transform: translateY(-5px);
    }
    .login-header {
        text-align: center;
        margin-bottom: 36px;
    }
    .login-header h1 {
        font-size: 28px;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 8px;
    }
    .login-header p {
        color: #64748b;
        font-size: 14px;
        font-weight: 500;
    }
    .input-group {
        margin-bottom: 24px;
    }
    .input-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #334155;
        margin-bottom: 8px;
    }
    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }
    .input-wrapper i {
        position: absolute;
        left: 16px;
        color: #94a3b8;
        font-size: 18px;
        pointer-events: none;
    }
    .input-wrapper input {
        width: 100%;
        padding: 14px 16px 14px 48px;
        font-size: 15px;
        font-family: 'Inter', sans-serif;
        border: 1.5px solid #e2e8f0;
        border-radius: 24px;
        outline: none;
        transition: all 0.2s ease;
        background-color: #f8fafc;
    }
    .input-wrapper input:focus {
        border-color: #667eea;
        background-color: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn-login {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-size: 16px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .btn-login:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <div class="login-header">
        <h1>Добро пожаловать</h1>
        <p>Введите свои учётные данные</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="input-group">
            <label class="input-label" for="login">Логин</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="login" name="login" placeholder="Ваш логин" required autofocus>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label" for="password">Пароль</label>
            <div class="input-wrapper">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Ваш пароль" required>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Войти
        </button>
    </form>
</div>
{% endblock %}
