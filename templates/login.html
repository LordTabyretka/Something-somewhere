<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Карточка входа */
        .login-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 440px;
            padding: 40px 32px;
            transition: transform 0.2s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Заголовок */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 18px;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Кнопка входа */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn i {
            font-size: 18px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        /* Дополнительные ссылки */
        .extra-links {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            font-size: 13px;
        }

        .extra-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .extra-links a:hover {
            color: #4c51bf;
            text-decoration: underline;
        }

        /* Сообщение об ошибке (будет скрыто, пока логика не добавится) */
        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
            text-align: center;
            display: none;
        }

        /* Адаптивность для маленьких экранов */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="error-message" style="display: block; margin-bottom: 20px;
                            {% if category == 'success' %}background-color: #d1fae5; color: #065f46;
                            {% elif category == 'warning' %}background-color: #fed7aa; color: #92400e;
                            {% else %}background-color: #fee2e2; color: #991b1b;{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <h1>Что-то где-то</h1>
            <p>Войдите в свой аккаунт</p>
        </div>

        <div class="error-message" id="errorMsg">
            <i class="fas fa-exclamation-circle"></i> Неверный логин или пароль
        </div>

        <form method="POST" action="#">
            <div class="input-group">
                <label class="input-label" for="login">Логин</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login" name="login" placeholder="Введите логин" required autofocus>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">Пароль</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i> Войти
            </button>
        </form>
    </div>

    <script>
        // Этот код не обязателен — он просто демонстрирует, как позже добавить вывод ошибок.
        // Если форма отправлена с пустыми полями, браузер сам покажет required.
        // Для реальной логики вы будете передавать флаг из Flask.
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.opacity = '0';
                setTimeout(() => errorDiv.style.display = 'none', 300);
            }, 4000);
        }
    </script>
</body>
</html>
